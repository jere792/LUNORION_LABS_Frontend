<nav class="breadcrumb">
  @for (item of items(); track item.label) {
    @if (item.route && !$last) {
      <a [routerLink]="item.route" class="breadcrumb-link">
        {{ item.label }}
      </a>
    } @else {
      <span class="breadcrumb-current">
        {{ item.label }}
      </span>
    }
    @if (!$last) {
      <!-- <i class="pi pi-angle-right separator"></i> -->
      <span class="separator">/</span>
    }
  }
</nav>
