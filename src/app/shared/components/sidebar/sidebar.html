<aside class="sidebar">
  <h2>{{ title() }}</h2>
  <ul>
    @for (item of items(); track item.route) {
      <li>
        <a [routerLink]="item.route" routerLinkActive="active-link">
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</aside>
